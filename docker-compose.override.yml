name: card-issuer-system

# Development overrides: mount source, use ts-node, expose all ports
services:
  card-issuer:
    build:
      target: deps
    command: npx turbo dev --filter=card-issuer
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
      HTTP_PORT: 3001

  card-processor:
    build:
      target: deps
    command: npx turbo dev --filter=card-processor
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development

  kafka-ui:
    profiles: [] # Always start kafka-ui in dev
